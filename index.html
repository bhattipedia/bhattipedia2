<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhattiPedia Pro</title>
    <style>
        :root { --primary: #128148; --gold: #DFA206; --dark: #1F2F29; --bg: #f2f7f5; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: var(--dark); padding-bottom: 80px; }
        .hidden { display: none !important; }
        
        /* Auth Styles */
        .container-center { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .card-auth { background: var(--white); padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); position: relative; }
        .admin-badge { position: absolute; top: -15px; right: 20px; background: var(--gold); color: white; padding: 5px 15px; border-radius: 15px; font-size: 12px; font-weight: 800; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        
        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #7f8c8d; font-size: 12px; cursor: pointer; font-weight: 600; flex: 1; }
        .nav-item.active { color: var(--primary); }

        /* Course Layout */
        header { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .course-card { background: white; margin: 15px; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .thumb { width: 100%; height: 180px; object-fit: cover; }
        .info { padding: 20px; }

        /* Admin Dashboard Styles */
        .admin-section { padding: 20px; background: #fff; margin: 15px; border-radius: 15px; border: 1px solid #eee; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: var(--dark); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="splash" style="position:fixed; top:0; width:100%; height:100%; background:var(--primary); z-index:9999; display:flex; justify-content:center; align-items:center; color:white;">
    <h1>BhattiPedia</h1>
</div>

<div id="auth-screen" class="container-center hidden">
    <div class="card-auth">
        <div id="admin-indicator" class="admin-badge hidden">ADMIN MODE</div>
        <h2 id="auth-title">Student Login</h2>
        
        <div id="auth-form">
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button id="main-auth-btn" class="btn btn-primary" onclick="processLogin()">Login</button>
            
            <p id="toggle-admin" class="link" style="text-align:center; margin-top:15px; font-size:13px; cursor:pointer; color:#2980b9;" onclick="setAuthMode('admin')">Login as Admin</p>
            <p id="toggle-user" class="link hidden" style="text-align:center; margin-top:15px; font-size:13px; cursor:pointer; color:#7f8c8d;" onclick="setAuthMode('user')">Back to Student Login</p>
        </div>
    </div>
</div>

<div id="main-app" class="hidden">
    <header>
        <div><b id="user-name">Loading...</b><br><small id="user-role">Student</small></div>
        <button onclick="logout()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:5px 10px;">Logout</button>
    </header>

    <div id="view-home" class="view"></div>
    <div id="view-paid" class="view hidden"></div>
    <div id="view-free" class="view hidden"></div>
    
    <div id="view-admin" class="view hidden">
        <div class="admin-section">
            <h3>Course Enrollment</h3>
            <input type="email" id="adm-target-email" placeholder="User Email">
            <input type="text" id="adm-target-course" placeholder="Course ID (e.g. C01)">
            <button class="btn btn-admin" onclick="adminAction('enroll')">Approve Access</button>
        </div>
        <div class="admin-section">
            <h3>Manage Courses</h3>
            <input type="text" id="new-c-title" placeholder="Course Title">
            <input type="text" id="new-c-id" placeholder="Course ID">
            <select id="new-c-type"><option value="Paid">Paid</option><option value="Free">Free</option></select>
            <button class="btn btn-primary" onclick="adminAction('addCourse')">Add Course</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="showTab('paid')">Paid</div>
        <div class="nav-item active" onclick="showTab('home')">Home</div>
        <div class="nav-item" onclick="showTab('free')">Free</div>
        <div id="nav-admin-btn" class="nav-item hidden" onclick="showTab('admin')">Admin</div>
    </nav>
</div>

<script>
    const API = "YOUR_GOOGLE_SCRIPT_URL";
    let is_admin_mode = false;

    window.onload = () => {
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            const session = JSON.parse(localStorage.getItem("bp_session"));
            if(session) {
                renderDashboard(session);
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        }, 1500);
    };

    function setAuthMode(mode) {
        is_admin_mode = (mode === 'admin');
        document.getElementById('auth-title').innerText = is_admin_mode ? "Admin Portal" : "Student Login";
        document.getElementById('admin-indicator').classList.toggle('hidden', !is_admin_mode);
        document.getElementById('toggle-admin').classList.toggle('hidden', is_admin_mode);
        document.getElementById('toggle-user').classList.toggle('hidden', !is_admin_mode);
        document.getElementById('main-auth-btn').className = is_admin_mode ? "btn btn-admin" : "btn btn-primary";
    }

    async function processLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const action = is_admin_mode ? 'adminLogin' : 'login';

        try {
            const res = await fetch(`${API}?action=${action}&email=${e}&password=${p}`);
            const data = await res.json();

            if(data.success) {
                const session = { e: e, name: data.name, role: is_admin_mode ? 'admin' : 'user' };
                localStorage.setItem("bp_session", JSON.stringify(session));
                renderDashboard(session);
            } else {
                alert("Authentication Failed: " + data.msg);
            }
        } catch(err) { alert("Server Error. Check your Script URL."); }
    }

    function renderDashboard(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-name').innerText = user.name;
        document.getElementById('user-role').innerText = user.role.toUpperCase();

        if(user.role === 'admin') {
            document.getElementById('nav-admin-btn').classList.remove('hidden');
        }
        loadContent(user.e);
    }

    async function loadContent(email) {
        const res = await fetch(`${API}?action=getAppData&email=${email}`);
        const courses = await res.json();
        // Logical rendering for Home, Paid, and Free tabs goes here
    }

    function showTab(tab) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`view-${tab}`).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }

    function logout() { localStorage.clear(); location.reload(); }

    async function adminAction(type) {
        // Logic to send approval/course management to GAS
        alert("Admin Request Sent: " + type);
    }
</script>
</body>
</html>
