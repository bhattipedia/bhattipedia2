<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoursePedia - MS Mukhtar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .bg-main { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); }
    </style>
</head>
<body class="bg-main font-sans text-slate-800">

    <div id="splash" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-1000">
        <h1 class="text-4xl font-black text-blue-600 animate-pulse">CoursePedia</h1>
        <p class="text-slate-400 mt-2 text-sm tracking-widest uppercase">BhattiPedia</p>
    </div>

    <div id="authBox" class="hidden min-h-screen flex items-center justify-center p-6">
        <div id="loginForm" class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-100">
            <h2 class="text-2xl font-black mb-6 text-blue-600">Login</h2>
            <input id="email" type="email" placeholder="Email" class="w-full p-3 border rounded-xl mb-3 bg-slate-50">
            <input id="pass" type="password" placeholder="Password" class="w-full p-3 border rounded-xl mb-6 bg-slate-50">
            <button onclick="handleLogin('user')" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold">Login</button>
            <div class="mt-6 flex justify-between text-xs font-bold text-blue-500 uppercase">
                <button onclick="toggleAuth('signupForm')">Signup</button>
                <button onclick="toggleAuth('adminForm')">Admin Portal</button>
            </div>
        </div>

        <div id="signupForm" class="hidden bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-black mb-6 text-green-600">Register</h2>
            <input id="sName" placeholder="Name" class="w-full p-3 border rounded-xl mb-2">
            <input id="sEmail" placeholder="Email" class="w-full p-3 border rounded-xl mb-2">
            <input id="sPass" type="password" placeholder="Password" class="w-full p-3 border rounded-xl mb-2">
            <input id="sMob" placeholder="Mobile" class="w-full p-3 border rounded-xl mb-6">
            <button onclick="handleSignup()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">Create Account</button>
            <button onclick="toggleAuth('loginForm')" class="mt-4 text-xs w-full text-slate-400">Back</button>
        </div>

        <div id="adminForm" class="hidden bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm">
            <h2 class="text-2xl font-black mb-6 text-slate-800">Admin</h2>
            <input id="aEmail" placeholder="Admin Email" class="w-full p-3 border rounded-xl mb-2">
            <input id="aPass" type="password" placeholder="Admin Password" class="w-full p-3 border rounded-xl mb-6">
            <button onclick="handleLogin('admin')" class="w-full bg-slate-800 text-white p-3 rounded-xl font-bold">Enter Dashboard</button>
            <button onclick="toggleAuth('loginForm')" class="mt-4 text-xs w-full text-slate-400">Cancel</button>
        </div>
    </div>

    <div id="homeUI" class="hidden min-h-screen">
        <nav class="bg-white p-4 border-b flex justify-between items-center sticky top-0 z-50">
            <span class="font-black text-xl text-blue-600">CoursePedia</span>
            <button onclick="location.reload()" class="text-xs font-bold text-slate-400 uppercase">Logout</button>
        </nav>
        <div class="max-w-6xl mx-auto p-6">
            <div id="courseGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <div id="paymentUI" class="hidden fixed inset-0 z-[110] bg-white flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-slate-50 p-8 rounded-3xl border">
            <h2 class="text-2xl font-black mb-6">Payment Details</h2>
            <div class="space-y-4 text-sm">
                <div class="bg-white p-4 rounded-xl border">
                    <p class="font-bold text-blue-600">EasyPaisa / JazzCash</p>
                    <p class="text-lg font-black">0309 7247244</p>
                    <p class="text-xs text-slate-400">Muhammad Sajid Mukhtar</p>
                </div>
                <div class="bg-white p-4 rounded-xl border">
                    <p class="font-bold text-blue-600">Allied Bank</p>
                    <p class="text-xs font-mono break-all">PK15ABPA0010129872550013</p>
                    <p class="text-xs text-slate-400">Muhammad Sajid Mukhtar</p>
                </div>
            </div>
            <button id="waBtn" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold mt-8">I have paid (WhatsApp)</button>
            <button onclick="closePayment()" class="w-full mt-4 text-slate-400 text-xs font-bold uppercase">Cancel</button>
        </div>
    </div>

    <div id="lessonUI" class="hidden min-h-screen p-6 bg-white">
        <button onclick="closeLessons()" class="mb-6 font-bold text-blue-600 uppercase text-xs">← Back</button>
        <div id="lessonList" class="max-w-2xl mx-auto space-y-4"></div>
    </div>

    <div id="adminUI" class="hidden min-h-screen p-8 bg-slate-50">
        <h1 class="text-3xl font-black mb-8">Admin Dashboard</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl border">
                <h3 class="font-bold mb-4">Approve User Access</h3>
                <input id="adEmail" placeholder="User Email" class="w-full p-2 border mb-2 rounded">
                <input id="adCID" placeholder="Course ID" class="w-full p-2 border mb-4 rounded">
                <button onclick="adminAction('approveCourse')" class="w-full bg-green-600 text-white p-2 rounded font-bold">Grant Access</button>
            </div>
            <div class="bg-white p-6 rounded-2xl border">
                <h3 class="font-bold mb-4">Add Content</h3>
                <button onclick="promptAdd('course')" class="w-full bg-slate-100 p-2 rounded mb-2 text-sm font-bold">+ New Course</button>
                <button onclick="promptAdd('lesson')" class="w-full bg-slate-100 p-2 rounded text-sm font-bold">+ New Lesson</button>
            </div>
        </div>
    </div>

    <div id="player" class="hidden fixed inset-0 bg-black z-[200] flex items-center justify-center p-4">
        <div class="w-full max-w-4xl">
            <div id="videoContainer"></div>
            <button onclick="closeVideo()" class="mt-4 bg-white px-8 py-2 rounded-full font-bold mx-auto block">Close</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbzFiyVuPyBe7k5-4seYr6Zyv_snZ-M11DanuZh6m3D9ZK1muzGmztVdST3cktNwBmNA/exec"; // REPLACE THIS!
        let user = null;
        let courses = [];
        let lessons = [];

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('splash').classList.add('hidden');
                    document.getElementById('authBox').classList.remove('hidden');
                }, 1000);
            }, 5000);
        };

        function toggleAuth(id) {
            ['loginForm', 'signupForm', 'adminForm'].forEach(f => document.getElementById(f).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function handleLogin(role) {
            const email = role === 'user' ? document.getElementById('email').value : document.getElementById('aEmail').value;
            const pass = role === 'user' ? document.getElementById('pass').value : document.getElementById('aPass').value;
            
            try {
                const res = await fetch(API, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: role === 'user' ? 'userLogin' : 'adminLogin', email, pass })
                });
                const json = await res.json();
                if(json.status === 'success') {
                    if(role === 'user') { user = json.user; startApp(); }
                    else { document.getElementById('authBox').classList.add('hidden'); document.getElementById('adminUI').classList.remove('hidden'); }
                } else { alert(json.message); }
            } catch (e) {
                console.error(e);
                alert("Connection Error. Check your Script Deployment settings.");
            }
        }

        async function startApp() {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('homeUI').classList.remove('hidden');
            const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getData' })});
            const json = await res.json();
            courses = json.courses;
            lessons = json.lessons;
            render('all');
        }

        function render(mode) {
            const grid = document.getElementById('courseGrid');
            grid.innerHTML = '';
            courses.forEach(c => {
                const isPaid = user.purchased.split(',').includes(String(c[0]));
                const isFree = c[2] === 'Free';
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl border border-slate-100 shadow-sm";
                card.innerHTML = `
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">${c[2]} | ID: ${c[0]}</p>
                    <h3 class="text-xl font-black mb-6">${c[1]}</h3>
                    ${(isFree || isPaid) ? 
                        `<button onclick="openLessons('${c[0]}','${c[1]}')" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Open Course</button>` :
                        `<div><p class="text-blue-600 font-black text-xl mb-3">Rs. ${c[3]}</p>
                         <button onclick="openPayment('${c[0]}','${c[1]}')" class="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">Buy Now</button></div>`
                    }
                `;
                grid.appendChild(card);
            });
        }

        function openPayment(id, name) {
            document.getElementById('paymentUI').classList.remove('hidden');
            document.getElementById('waBtn').onclick = () => {
                window.open(`https://wa.me/923127030379?text=I paid for Course: ${name} (ID: ${id}). Email: ${user.email}`);
            };
        }
        function closePayment() { document.getElementById('paymentUI').classList.add('hidden'); }

        function openLessons(id, title) {
            document.getElementById('homeUI').classList.add('hidden');
            document.getElementById('lessonUI').classList.remove('hidden');
            const list = document.getElementById('lessonList');
            list.innerHTML = `<h2 class="text-2xl font-black mb-6">${title}</h2>`;
            lessons.filter(l => l[0] == id).forEach(l => {
                const item = document.createElement('div');
                item.className = "flex items-center gap-4 bg-slate-50 p-4 rounded-2xl cursor-pointer";
                item.onclick = () => { document.getElementById('videoContainer').innerHTML = l[4]; document.getElementById('player').classList.remove('hidden'); };
                item.innerHTML = `<img src="${l[3]}" class="w-20 h-12 rounded-lg bg-slate-200"><div><p class="text-xs font-bold text-blue-500">Lesson ${l[1]}</p><h4 class="font-bold">${l[2]}</h4></div>`;
                list.appendChild(item);
            });
        }

        function closeLessons() { document.getElementById('lessonUI').classList.add('hidden'); document.getElementById('homeUI').classList.remove('hidden'); }
        function closeVideo() { document.getElementById('videoContainer').innerHTML = ''; document.getElementById('player').classList.add('hidden'); }

        async function adminAction(sub) {
            const res = await fetch(API, { method: 'POST', body: JSON.stringify({ 
                action: 'adminAction', sub: sub, target: document.getElementById('adEmail').value, id: document.getElementById('adCID').value 
            })});
            const json = await res.json();
            alert(json.message);
        }

        async function promptAdd(type) {
            const action = { action: 'adminAction', sub: type === 'course' ? 'addCourse' : 'addLesson' };
            if(type === 'course') {
                action.id = prompt("ID:"); action.name = prompt("Name:"); action.type = prompt("Free/Premium:"); action.price = prompt("Price:");
            } else {
                action.id = prompt("Course ID:"); action.num = prompt("Lesson No:"); action.title = prompt("Title:"); action.thumb = prompt("Thumb URL:"); action.link = prompt("Embed Code:");
            }
            const res = await fetch(API, { method: 'POST', body: JSON.stringify(action)});
            alert("Done");
        }
    </script>
</body>
</html>
