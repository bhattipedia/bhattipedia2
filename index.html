<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BhattiPedia Pro</title>
    <style>
        :root { --primary: #128148; --gold: #DFA206; --dark: #1F2F29; --bg: #f2f7f5; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .hidden { display: none !important; }
        
        /* Auth */
        .card-auth { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; margin: 50px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--gold); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: var(--dark); color: white; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-item { text-align: center; color: #7f8c8d; font-size: 12px; cursor: pointer; flex: 1; font-weight: 700; }
        .nav-item.active { color: var(--primary); }

        header { background: var(--primary); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .course-card { background: white; margin: 15px; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .thumb { width: 100%; height: 160px; object-fit: cover; }
        .info { padding: 15px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card-auth">
        <h2 id="auth-title">Student Login</h2>
        <div id="login-fields">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button id="login-btn" class="btn btn-primary" onclick="handleLogin()">Login</button>
            <p id="signup-link" style="text-align:center; cursor:pointer; color:blue;" onclick="toggleSignup(true)">Create Account</p>
            <p style="text-align:center; cursor:pointer; font-size:12px;" onclick="window.open('https://wa.me/923097247244')">Forgot Password?</p>
            <hr>
            <button id="admin-mode-btn" class="btn btn-admin" onclick="setAdminMode(true)">Login as Admin</button>
        </div>
        <div id="signup-fields" class="hidden">
            <input type="text" id="s-name" placeholder="Full Name">
            <input type="email" id="s-email" placeholder="Email">
            <input type="password" id="s-pass" placeholder="Password">
            <button class="btn btn-primary" onclick="handleSignup()">Register</button>
            <p style="text-align:center; cursor:pointer;" onclick="toggleSignup(false)">Back to Login</p>
        </div>
    </div>
</div>

<div id="app-screen" class="hidden">
    <header>
        <div><b id="display-name">User</b><br><small id="display-role">Student</small></div>
        <button onclick="location.reload()" style="color:white; background:none; border:1px solid white;">Logout</button>
    </header>

    <div id="view-paid" class="hidden"></div>
    <div id="view-home"></div>
    <div id="view-free" class="hidden"></div>
    
    <div id="view-admin" class="hidden">
        <div style="padding:20px;">
            <h3>Admin: Course Approval</h3>
            <input type="email" id="adm-user" placeholder="User Email">
            <input type="text" id="adm-cid" placeholder="Course ID">
            <button class="btn btn-admin" onclick="adminAction('enroll')">Approve User</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="switchTab('paid')">PAID</div>
        <div class="nav-item active" onclick="switchTab('home')">HOME</div>
        <div class="nav-item" onclick="switchTab('free')">FREE</div>
        <div id="admin-tab" class="nav-item hidden" onclick="switchTab('admin')">ADMIN</div>
    </nav>
</div>

<script>
    const API = "YOUR_NEW_DEPLOY_URL";
    let isAdmin = false;

    function setAdminMode(val) {
        isAdmin = val;
        document.getElementById('auth-title').innerText = val ? "Admin Portal" : "Student Login";
        document.getElementById('signup-link').classList.toggle('hidden', val);
        document.getElementById('admin-mode-btn').classList.toggle('hidden', val);
    }

    function toggleSignup(val) {
        document.getElementById('login-fields').classList.toggle('hidden', val);
        document.getElementById('signup-fields').classList.toggle('hidden', !val);
    }

    async function handleLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        const action = isAdmin ? 'adminLogin' : 'login';
        
        const res = await fetch(`${API}?action=${action}&email=${e}&password=${p}`);
        const d = await res.json();
        
        if(d.success) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('display-name').innerText = d.userName;
            if(isAdmin) document.getElementById('admin-tab').classList.remove('hidden');
            loadData(e);
        } else {
            alert(d.msg);
        }
    }

    async function loadData(email) {
        const res = await fetch(`${API}?action=getData&email=${email}`);
        const courses = await res.json();
        renderHome(courses);
    }

    function renderHome(data) {
        document.getElementById('view-home').innerHTML = data.map(c => `
            <div class="course-card">
                <img src="${c.thumb}" class="thumb">
                <div class="info">
                    <h4>${c.title}</h4>
                    ${c.locked ? `<button class="btn btn-primary">Rs. ${c.price} - Unlock</button>` : `<button class="btn btn-primary">Start Learning</button>`}
                </div>
            </div>
        `).join('');
    }

    function switchTab(tab) {
        ['view-home', 'view-paid', 'view-free', 'view-admin'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById('view-' + tab).classList.remove('hidden');
    }
</script>
</body>
</html>
